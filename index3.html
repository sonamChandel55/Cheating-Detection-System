<!DOCTYPE html>
<html>
<head>
<title>Attendance System Pro</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f6f8;
}

/* LOGIN */
#loginBox{
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    background:#1976D2;
    color:white;
    border:none;
    cursor:pointer;
}

/* DASHBOARD */
#dashboard{
    display:none;
}

.header{
    background:#1976D2;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.container{
    width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

table{
    width:90%;
    margin:20px auto;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#1976D2;
    color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h3>Admin Login</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
    ATTENDANCE SYSTEM DASHBOARD
</div>

<div class="container">

<h3>Add Attendance</h3>

<input type="text" id="empId" placeholder="Employee ID">
<input type="text" id="empName" placeholder="Employee Name">
<input type="date" id="empDate">

<select id="status">
    <option>Present</option>
    <option>Absent</option>
    <option>Leave</option>
</select>

<button onclick="markAttendance()">Mark Attendance</button>

</div>

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Date</th>
    <th>Status</th>
</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

</div>

<script>

// LOGIN
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u=="admin" && p=="1234"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("dashboard").style.display="block";
        loadData();
    } else {
        alert("Invalid Login (admin/1234)");
    }
}

// SAVE ATTENDANCE
function markAttendance(){

    let id = document.getElementById("empId").value;
    let name = document.getElementById("empName").value;
    let date = document.getElementById("empDate").value;
    let status = document.getElementById("status").value;

    if(id=="" || name=="" || date==""){
        alert("Fill all fields");
        return;
    }

    let data = JSON.parse(localStorage.getItem("attendance")) || [];

    data.push({
        id:id,
        name:name,
        date:date,
        status:status
    });

    localStorage.setItem("attendance", JSON.stringify(data));

    loadData();

    document.getElementById("empId").value="";
    document.getElementById("empName").value="";
    document.getElementById("empDate").value="";
}

// LOAD DATA
function loadData(){

    let data = JSON.parse(localStorage.getItem("attendance")) || [];

    let table = document.getElementById("tableData");
    table.innerHTML="";

    data.forEach(item=>{
        let row = table.insertRow();

        row.insertCell(0).innerHTML = item.id;
        row.insertCell(1).innerHTML = item.name;
        row.insertCell(2).innerHTML = item.date;
        row.insertCell(3).innerHTML = item.status;
    });
}

</script>

</body>
</html>
